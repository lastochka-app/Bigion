<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Inblelt Video Hosting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Inblelt Video</h1>

    <div id="auth-section">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth('signup')">Регистрация</button>
        <button onclick="handleAuth('signin')">Вход</button>
    </div>

    <div id="user-info" style="display:none;">
        <p>Вы вошли как: <b id="display-name"></b></p>
        <button onclick="signOut()">Выйти</button>
        <hr>
        <input type="file" id="video-file" accept="video/*">
        <input type="text" id="video-title" placeholder="Название">
        <button onclick="uploadVideo()">Загрузить видео</button>
    </div>

    <hr>
    <div id="video-feed"></div>

    <script>
        const SUPABASE_URL = 'https://hroxfgyxhfiezodxmvfl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ul6uWjrWu328yTL2qJJYGQ_a3xsnWR9';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Вспомогательная функция для email
        const toEmail = (name) => `${name.toLowerCase()}@inblelt.local`;

        async function handleAuth(type) {
            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;
            const email = toEmail(userVal);

            if (type === 'signup') {
                // 1. Создаем системного пользователя
                const { data, error } = await supabase.auth.signUp({ email, password: passVal });
                if (error) return alert(error.message);

                // 2. Создаем запись в нашей таблице profiles
                if (data.user) {
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([{ id: data.user.id, username: userVal }]);
                    
                    if (profileError) alert("Ошибка профиля: " + profileError.message);
                    else alert("Готово! Теперь войдите.");
                }
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password: passVal });
                if (error) alert(error.message);
                else location.reload();
            }
        }

        async function signOut() {
            await supabase.auth.signOut();
            location.reload();
        }

        // Проверка входа и получение данных из таблицы profiles
        supabase.auth.onAuthStateChange(async (event, session) => {
            if (session) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                
                // Берем имя именно из таблицы profiles
                const { data } = await supabase
                    .from('profiles')
                    .select('username')
                    .eq('id', session.user.id)
                    .single();
                
                if (data) document.getElementById('display-name').innerText = data.username;
            }
        });

        async function uploadVideo() {
            const file = document.getElementById('video-file').files[0];
            const title = document.getElementById('video-title').value;
            const { data: { user } } = await supabase.auth.getUser();

            if (!file || !user) return alert('Ошибка');

            // Получаем имя автора из профиля перед загрузкой
            const { data: profile } = await supabase.from('profiles').select('username').eq('id', user.id).single();

            const fileName = `${Date.now()}_${file.name}`;
            const { error: storageErr } = await supabase.storage.from('videos').upload(fileName, file);
            if (storageErr) return alert(storageErr.message);

            const { data: urlData } = supabase.storage.from('videos').getPublicUrl(fileName);

            await supabase.from('videos').insert([{
                title: title,
                url: urlData.publicUrl,
                user_id: user.id,
                author_name: profile ? profile.username : 'Аноним'
            }]);

            location.reload();
        }

        async function loadVideos() {
            const { data: videos } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';

            if (videos) {
                videos.forEach(v => {
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <h4>${v.title} <small>(Автор: ${v.author_name || 'Неизвестен'})</small></h4>
                        <video src="${v.url}" width="320" controls></video>
                        <p>Лайков: ${v.likes_count || 0} <button onclick="likeVideo('${v.id}')">❤️</button></p>
                        <hr>
                    `;
                    feed.appendChild(div);
                });
            }
        }

        async function likeVideo(videoId) {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert('Войдите!');

            const { error } = await supabase.from('likes').insert([{ user_id: user.id, video_id: videoId }]);
            if (error) return alert('Уже лайкнуто');

            const { data } = await supabase.from('videos').select('likes_count').eq('id', videoId).single();
            await supabase.from('videos').update({ likes_count: (data.likes_count || 0) + 1 }).eq('id', videoId);
            loadVideos();
        }

        loadVideos();
    </script>
</body>
</html>
