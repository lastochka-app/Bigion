<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Inblelt Video Hosting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Inblelt Video Hosting</h1>

    <!-- БЛОК АВТОРИЗАЦИИ -->
    <div id="auth-section">
        <h3>Вход / Регистрация</h3>
        <input type="text" id="username" placeholder="Имя пользователя (Username)">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="handleAuth('signup')">Создать аккаунт</button>
        <button onclick="handleAuth('signin')">Войти</button>
    </div>

    <div id="user-info" style="display:none;">
        <p>Привет, <b id="display-name"></b>!</p>
        <button onclick="signOut()">Выйти</button>
        <hr>
        
        <h3>Загрузить видео</h3>
        <input type="file" id="video-file" accept="video/*">
        <input type="text" id="video-title" placeholder="Название видео">
        <button onclick="uploadVideo()">Загрузить</button>
    </div>

    <hr>
    <h3>Лента видео</h3>
    <div id="video-feed">Загрузка...</div>

    <script>
        const SUPABASE_URL = 'https://hroxfgyxhfiezodxmvfl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ul6uWjrWu328yTL2qJJYGQ_a3xsnWR9';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Функция-трансформер: превращает username в формат, который съест Supabase
        function formatEmail(username) {
            return `${username.toLowerCase()}@inblelt.local`;
        }

        async function handleAuth(type) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = formatEmail(username);

            if (username.length < 3) return alert('Имя слишком короткое');

            let result;
            if (type === 'signup') {
                result = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { username: username } } // Сохраняем реальное имя в метаданные
                });
                if (!result.error) alert('Аккаунт создан! Теперь нажмите "Войти"');
            } else {
                result = await supabase.auth.signInWithPassword({ email, password });
            }

            if (result.error) alert(result.error.message);
            else if (type === 'signin') location.reload();
        }

        async function signOut() {
            await supabase.auth.signOut();
            location.reload();
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                // Берем имя из метаданных, которые мы сохранили при регистрации
                document.getElementById('display-name').innerText = session.user.user_metadata.username || session.user.email;
            }
        });

        // --- ЗАГРУЗКА И ЛАЙКИ (без изменений в логике) ---

        async function uploadVideo() {
            const file = document.getElementById('video-file').files[0];
            const title = document.getElementById('video-title').value;
            const { data: { user } } = await supabase.auth.getUser();

            if (!file || !user) return alert('Ошибка доступа');

            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabase.storage.from('videos').upload(fileName, file);

            if (error) return alert('Ошибка Storage: ' + error.message);

            const { data: urlData } = supabase.storage.from('videos').getPublicUrl(fileName);
            
            await supabase.from('videos').insert([
                { 
                    title: title, 
                    url: urlData.publicUrl, 
                    user_id: user.id 
                }
            ]);
            location.reload();
        }

        async function loadVideos() {
            const { data: videos } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';

            if (videos) {
                videos.forEach(v => {
                    const div = document.createElement('div');
                    div.innerHTML = `
                        <h4>${v.title}</h4>
                        <video src="${v.url}" width="320" controls preload="metadata"></video>
                        <p>Лайков: ${v.likes_count} <button onclick="likeVideo('${v.id}')">❤️</button></p>
                        <hr>
                    `;
                    feed.appendChild(div);
                });
            }
        }

        async function likeVideo(videoId) {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return alert('Войдите для лайка');

            const { error } = await supabase.from('likes').insert([{ user_id: user.id, video_id: videoId }]);
            if (error) return alert('Уже лайкнуто');

            const { data } = await supabase.from('videos').select('likes_count').eq('id', videoId).single();
            await supabase.from('videos').update({ likes_count: (data.likes_count || 0) + 1 }).eq('id', videoId);
            loadVideos();
        }

        loadVideos();
    </script>
</body>
</html>
