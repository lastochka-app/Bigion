<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Inblelt Mini Video</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Inblelt Video Hosting</h1>

    <!-- БЛОК АВТОРИЗАЦИИ -->
    <div id="auth-section">
        <h3>Вход / Регистрация</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="signUp()">Зарегистрироваться</button>
        <button onclick="signIn()">Войти</button>
    </div>

    <div id="user-info" style="display:none;">
        <p>Вы вошли как: <b id="user-email"></b></p>
        <button onclick="signOut()">Выйти</button>
        <hr>
        
        <!-- БЛОК ЗАГРУЗКИ -->
        <h3>Загрузить видео (до 10МБ)</h3>
        <input type="file" id="video-file" accept="video/*">
        <input type="text" id="video-title" placeholder="Название видео">
        <button onclick="uploadVideo()">Загрузить</button>
    </div>

    <hr>

    <!-- ЛЕНТА ВИДЕО -->
    <h3>Лента видео</h3>
    <div id="video-feed">Загрузка видео...</div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = 'https://hroxfgyxhfiezodxmvfl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ul6uWjrWu328yTL2qJJYGQ_a3xsnWR9'; // Твой публичный ключ
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- ФУНКЦИИ АВТОРИЗАЦИИ ---
        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert('Проверь почту для подтверждения!');
        }

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else location.reload();
        }

        async function signOut() {
            await supabase.auth.signOut();
            location.reload();
        }

        // Проверка сессии
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('user-email').innerText = session.user.email;
            }
        });

        // --- ФУНКЦИИ ВИДЕО ---
        async function uploadVideo() {
            const file = document.getElementById('video-file').files[0];
            const title = document.getElementById('video-title').value;
            const user = (await supabase.auth.getUser()).data.user;

            if (!file || !user) return alert('Выбери файл и войди в систему');

            // 1. Загрузка в Storage (бакет должен называться 'videos')
            const fileName = `${Date.now()}_${file.name}`;
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('videos')
                .upload(fileName, file);

            if (uploadError) return alert('Ошибка загрузки: ' + uploadError.message);

            // 2. Получаем публичную ссылку
            const { data: urlData } = supabase.storage.from('videos').getPublicUrl(fileName);
            const videoUrl = urlData.publicUrl;

            // 3. Запись в таблицу
            const { error: dbError } = await supabase.from('videos').insert([
                { title: title, url: videoUrl, user_id: user.id }
            ]);

            if (dbError) alert(dbError.message);
            else location.reload();
        }

        async function loadVideos() {
            const { data: videos, error } = await supabase
                .from('videos')
                .select('*')
                .order('created_at', { ascending: false });

            const feed = document.getElementById('video-feed');
            feed.innerHTML = '';

            videos.forEach(video => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <h4>${video.title}</h4>
                    <video src="${video.url}" width="320" controls></video>
                    <p>Лайков: ${video.likes_count} <button onclick="likeVideo('${video.id}')">❤️ Лайк</button></p>
                    <hr>
                `;
                feed.appendChild(div);
            });
        }

        async function likeVideo(videoId) {
            const user = (await supabase.auth.getUser()).data.user;
            if (!user) return alert('Войдите, чтобы лайкать');

            // Пробуем добавить лайк в таблицу
            const { error } = await supabase.from('likes').insert([
                { user_id: user.id, video_id: videoId }
            ]);

            if (error) {
                alert('Вы уже лайкнули это видео');
            } else {
                // Если лайк прошел, обновляем счетчик в таблице видео (для простоты)
                // В реальном проекте лучше использовать RPC функцию
                const { data } = await supabase.from('videos').select('likes_count').eq('id', videoId).single();
                await supabase.from('videos').update({ likes_count: data.likes_count + 1 }).eq('id', videoId);
                loadVideos();
            }
        }

        loadVideos();
    </script>
</body>
</html>
